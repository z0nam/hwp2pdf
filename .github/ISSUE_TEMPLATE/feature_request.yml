name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or pain point should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like hwp2pdf to do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Windows/Hancom environment details, examples, or screenshots
    validations:
      required: false
